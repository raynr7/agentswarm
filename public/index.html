<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSwarp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#1d1d1f;min-height:100vh}
nav{background:rgba(251,251,253,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid #e0e0e0;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:1.1em;font-weight:700;letter-spacing:-0.5px}
.badge{background:#e8f5e9;color:#2e7d32;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:500}
.container{max-width:1100px;margin:0 auto;padding:24px 32px;display:grid;grid-template-columns:1fr 320px;gap:24px}
@media(max-width:860px){.container{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:16px;padding:20px 24px;margin-bottom:16px}
.card h3{font-size:.8em;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.card .val{font-size:2em;font-weight:700;letter-spacing:-1px}
label{font-size:.75em;font-weight:500;color:#86868b;display:block;margin-bottom:4px}
input,select{width:100%;padding:10px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:14px;outline:none;font-family:inherit;background:#fff}
input:focus,select:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,0.15)}
.btn{background:#0071e3;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn:hover{background:#0077ED}
.btn:active{transform:scale(.98)}
.chat{height:360px;overflow-y:auto;padding:16px;background:#f5f5f7;border-radius:16px;margin-bottom:12px}
.msg{max-width:75%;margin-bottom:8px;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.4}
.msg.me{background:#0071e3;color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg.bot{background:#fff;border:1px solid #e5e5e5;border-bottom-left-radius:4px}
.msg .name{font-size:.7em;font-weight:600;margin-bottom:4px;opacity:.7}
.row{display:flex;gap:8px}
.input{flex:1;padding:12px 16px;border:1px solid #d2d2d7;border-radius:24px;font-size:14px;outline:none;font-family:inherit}
.input:focus{border-color:#0071e3}
.send{width:44px;height:44px;border-radius:50%;background:#0071e3;color:#fff;border:none;cursor:pointer;font-size:18px}
.send:hover{background:#0077ED}
.side .card{padding:16px}
.item{padding:10px 12px;border-radius:10px;font-size:13px;cursor:pointer;transition:background .15s}
.item:hover{background:#f5f5f7}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#34c759;margin-right:8px}
.dot.off{background:#d2d2d7}
input[type=password]{font-family:monospace}
</style>
</head>
<body>
<nav>
<div class="logo">AgentSwarp</div>
<span class="badge">● Online</span>
</nav>
<div class="container">
<div>
<div class="chat" id="chat">
<div class="msg bot"><div class="name">Agent</div>Ready. What should I build?</div>
</div>
<div class="row">
<input class="input" id="msg" placeholder="Type a goal or question..." onkeypress="if(event.key==='Enter')send()">
<button class="send" onclick="send()">→</button>
</div>
<div class="card">
<h3>Tasks</h3>
<div class="item"><span class="dot"></span>Research AI trends</div>
<div class="item"><span class="dot off"></span>Build landing page <span class="badge" style="float:right">done</span></div>
<div class="item"><span class="dot"></span>Deploy to GitHub</div>
</div>
</div>
<div class="side">
<div class="card">
<h3>Model</h3>
<label>Provider</label>
<select id="prov"><option value="openrouter">OpenRouter</option><option value="groq">Groq</option><option value="ollama">Ollama</option></select>
<label>Model ID</label>
<input type="text" id="model" value="openrouter/healer-alpha">
<label>API Key</label>
<input type="password" id="key" value="sk-or-v1-...">
</div>
<div class="card">
<h3>Skills</h3>
<div class="item">🔍 Web Search</div>
<div class="item">💻 Shell Execute</div>
<div class="item">📁 File System</div>
<div class="item">🐙 GitHub Push</div>
<div class="item">🌐 Browser</div>
<div class="item">📧 Email Send</div>
</div>
<div class="card">
<h3>Config</h3>
<label>Max Tasks/Hour</label>
<input type="number" value="99999">
<label>Allowed</label>
<input type="text" value="* (everything)">
<label>Workspace</label>
<input type="text" value="/home/ubuntu/.zeroclaw">
</div>
</div>
</div>
<script>
var chat=document.getElementById('chat');
function send(){var m=document.getElementById('msg').value;if(!m)return;
chat.innerHTML+='<div class=\"msg me\">'+m+'</div>';
document.getElementById('msg').value='';
chat.scrollTop=chat.scrollHeight;
fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:m})}).then(r=>r.json()).then(d=>{chat.innerHTML+='<div class=\"msg bot\"><div class=\"name\">Agent</div>Task '+d.id.slice(0,8)+' created</div>';chat.scrollTop=chat.scrollHeight;}).catch(e=>{chat.innerHTML+='<div class=\"msg bot\">Error: '+e.message+'</div>';});
}
</script>
</body>
</html>
