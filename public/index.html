<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSwarp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#141414;--border:#222;--text:#e0e0e0;--dim:#666;--accent:#fff;--green:#00e676}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.top{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px}
.top h1{font-size:1.2em;font-weight:600}
.status{color:var(--green);font-size:.85em}
.main{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 300px;gap:16px}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-size:.95em;color:var(--dim);margin-bottom:12px;font-weight:500}
.chat-box{height:400px;overflow-y:auto;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px}
.msg{margin-bottom:12px;padding:8px 12px;border-radius:8px;max-width:80%}
.msg.user{background:#1a1a2e;margin-left:auto;text-align:right}
.msg.agent{background:#1a1a1a}
.msg .role{font-size:.7em;color:var(--dim);margin-bottom:4px}
.input-row{display:flex;gap:8px}
.input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:14px;outline:none}
.input:focus{border-color:#444}
.btn{background:#fff;color:#000;border:none;padding:12px 20px;border-radius:8px;font-weight:600;cursor:pointer}
.btn:hover{background:#ddd}
.sidebar .card{padding:12px}
.item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:.9em;transition:background .2s}
.item:hover{background:var(--border)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:8px}
input[type=text],input[type=password],select{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;width:100%;margin-bottom:8px}
label{font-size:.8em;color:var(--dim);display:block;margin-bottom:4px}
</style>
</head>
<body>
<div class="top">
<h1>AgentSwarp</h1>
<span class="status">● Online</span>
</div>
<div class="main">
<div>
<div class="chat-box" id="chat">
<div class="msg agent"><div class="role">Agent</div>Hello! I'm ready. What should I work on?</div>
</div>
<div class="input-row">
<input class="input" id="msg" placeholder="Type a message or goal..." onkeypress="if(event.key==='Enter')send()">
<button class="btn" onclick="send()">Send</button>
</div>
<div class="card">
<h2>Recent Tasks</h2>
<div class="item"><span class="dot"></span>Research AI trends</div>
<div class="item"><span class="dot"></span>Build landing page</div>
<div class="item"><span class="dot"></span>Fix GitHub links</div>
</div>
</div>
<div class="sidebar">
<div class="card">
<h2>Model</h2>
<label>Provider</label>
<select><option>OpenRouter</option><option>Groq</option><option>Ollama</option></select>
<label>Model</label>
<input type="text" value="openrouter/healer-alpha">
<label>API Key</label>
<input type="password" value="sk-or-v1-...">
</div>
<div class="card">
<h2>Skills</h2>
<div class="item">🔧 Shell Execute</div>
<div class="item">🌐 Web Search</div>
<div class="item">📁 File Manager</div>
<div class="item">🐙 GitHub</div>
<div class="item">📧 Email</div>
</div>
<div class="card">
<h2>Config</h2>
<label>Max Tasks/Hour</label>
<input type="text" value="99999">
<label>Allowed Commands</label>
<input type="text" value="*">
</div>
</div>
</div>
<script>
function send(){var m=document.getElementById('msg').value;if(!m)return;
var chat=document.getElementById('chat');
chat.innerHTML+='<div class=\"msg user\"><div class=\"role\">You</div>'+m+'</div>';
document.getElementById('msg').value='';
fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:m})}).then(r=>r.json()).then(d=>{chat.innerHTML+='<div class=\"msg agent\"><div class=\"role\">Agent</div>Task added: '+d.id.slice(0,8)+'</div>';chat.scrollTop=chat.scrollHeight;});
}
</script>
</body>
</html>
