<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSwarp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:rgba(18,18,26,0.8);--border:rgba(255,255,255,0.08);--text:#e0e0e0;--dim:#888;--accent:#6c5ce7;--green:#00e676;--red:#ff5252;--glow:rgba(108,92,231,0.3)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 0%,rgba(108,92,231,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(0,206,201,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.header{position:sticky;top:0;z-index:100;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-size:1.4em;font-weight:700;background:linear-gradient(135deg,#6c5ce7,#00cec9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:rgba(0,230,118,0.15);color:var(--green)}
.main{max-width:1200px;margin:0 auto;padding:24px;position:relative;z-index:1}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all .3s ease}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(108,92,231,0.15);border-color:var(--accent)}
.card h3{font-size:.85em;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card .value{font-size:2.2em;font-weight:700}
.accent{color:var(--accent)}
.green{color:var(--green)}
.input-row{display:flex;gap:12px;margin-bottom:24px}
.input{flex:1;background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-size:15px;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
.btn{background:linear-gradient(135deg,#6c5ce7,#00cec9);color:#fff;border:none;padding:14px 24px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px var(--glow)}
.agent{display:flex;align-items:center;gap:12px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;transition:all .3s}
.agent:hover{border-color:var(--accent);transform:translateX(4px)}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.idle{background:var(--dim);box-shadow:none}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--glow)}50%{box-shadow:0 0 20px var(--glow)}}
.card{animation:slideUp .4s ease}
.agent{animation:slideUp .3s ease}
.pulse{animation:pulse 2s infinite}
.glow{animation:glow 2s infinite}
</style>
</head>
<body>
<div class="header">
<div class="logo">AgentSwarp</div>
<span class="badge badge-green">● Online</span>
</div>
<div class="main">
<div class="grid">
<div class="card"><h3>Agents</h3><div class="value accent">5</div></div>
<div class="card"><h3>Tasks Today</h3><div class="value">24</div></div>
<div class="card"><h3>Memory</h3><div class="value green">128</div></div>
<div class="card"><h3>Uptime</h3><div class="value" id="up">--</div></div>
</div>
<div class="card" style="margin-bottom:16px">
<h3>Give me a goal</h3>
<div class="input-row">
<input class="input" id="goal" placeholder="Research AI trends, build a tool, deploy...">
<button class="btn" onclick="addGoal()">Execute</button>
</div>
</div>
<div class="card">
<h3>Active Agents</h3>
<div class="agent"><div class="dot pulse"></div><span>Research Scout</span></div>
<div class="agent"><div class="dot pulse" style="animation-delay:.3s"></div><span>Code Builder</span></div>
<div class="agent"><div class="dot pulse" style="animation-delay:.6s"></div><span>Deploy Agent</span></div>
<div class="agent"><div class="dot idle"></div><span>Memory Keeper</span></div>
<div class="agent"><div class="dot idle"></div><span>Web Scraper</span></div>
</div>
</div>
<script>
function addGoal(){var g=document.getElementById('goal').value;if(!g)return;
fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:g})}).then(r=>r.json()).then(d=>{alert('Task #'+d.id.slice(0,8)+' added!');document.getElementById('goal').value='';})}
fetch('/api/status').then(r=>r.json()).then(d=>{document.getElementById('up').textContent=Math.floor(d.uptime/60)+' min'});
</script>
</body>
</html>
