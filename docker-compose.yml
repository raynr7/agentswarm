version: "3.9"

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_WS_URL=ws://api:8000
    depends_on: [api]
    deploy:
      resources:
        limits: { memory: 512M }

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=postgresql://agentswarp:secret@db:5432/agentswarp
      - REDIS_URL=redis://cache:6379
      - WORKERS=1
    depends_on: [db, cache]
    deploy:
      resources:
        limits: { memory: 700M }

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=agentswarp
      - POSTGRES_USER=agentswarp
      - POSTGRES_PASSWORD=secret
    volumes: [pgdata:/var/lib/postgresql/data]
    deploy:
      resources:
        limits: { memory: 256M }

  cache:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits: { memory: 128M }

volumes:
  pgdata:

# Total: 512 + 700 + 256 + 128 = ~1.6GB — well under the 2GB OCI ceiling
