<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0a0a0b"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- network nodes connected like a swarm -->
  <circle cx="9"  cy="16" r="2.5" fill="url(#g1)"/>
  <circle cx="17" cy="8"  r="2.5" fill="url(#g1)"/>
  <circle cx="23" cy="16" r="2.5" fill="url(#g1)"/>
  <circle cx="17" cy="24" r="2.5" fill="url(#g1)"/>
  <circle cx="16" cy="16" r="1.5" fill="#a78bfa"/>
  <!-- edges -->
  <line x1="9"  y1="16" x2="16" y2="16" stroke="#7c3aed" stroke-width="1.2" stroke-opacity=".7"/>
  <line x1="17" y1="8"  x2="16" y2="16" stroke="#7c3aed" stroke-width="1.2" stroke-opacity=".7"/>
  <line x1="23" y1="16" x2="16" y2="16" stroke="#4f46e5" stroke-width="1.2" stroke-opacity=".7"/>
  <line x1="17" y1="24" x2="16" y2="16" stroke="#4f46e5" stroke-width="1.2" stroke-opacity=".7"/>
  <line x1="9"  y1="16" x2="17" y2="8"  stroke="#6d28d9" stroke-width="0.8" stroke-opacity=".4"/>
  <line x1="17" y1="8"  x2="23" y2="16" stroke="#6d28d9" stroke-width="0.8" stroke-opacity=".4"/>
  <line x1="23" y1="16" x2="17" y2="24" stroke="#6d28d9" stroke-width="0.8" stroke-opacity=".4"/>
  <line x1="17" y1="24" x2="9"  y2="16" stroke="#6d28d9" stroke-width="0.8" stroke-opacity=".4"/>
</svg>
